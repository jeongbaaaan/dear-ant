<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dear,ANT — Home v3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* ══════════════════════════════════════
     DESIGN TOKENS
     ══════════════════════════════════════ */
  :root {
    /* Green Palette */
    --g900: #1B4332; --g800: #2D6A4F; --g700: #40916C; --g600: #52B788;
    --g500: #74C69D; --g400: #95D5B2; --g300: #B7E4C7; --g200: #D8F3DC;
    --g100: #E8F5E9; --g50: #F0FFF4;

    /* Emotion Spectrum */
    --calm: #2DD4BF;       /* mint-400 */
    --confident: #60A5FA;  /* blue-400 */
    --excited: #FBBF24;    /* amber-400 */
    --anxious: #F97316;    /* orange-500 */
    --fearful: #EF4444;    /* red-500 */

    /* Grade Colors */
    --grade-s: #D97706; --grade-s-bg: #FEF3C7;
    --grade-a: #059669; --grade-a-bg: #D1FAE5;
    --grade-b: #2563EB; --grade-b-bg: #DBEAFE;
    --grade-c: #D97706; --grade-c-bg: #FEF3C7;
    --grade-d: #F97316; --grade-d-bg: #FFEDD5;
    --grade-f: #DC2626; --grade-f-bg: #FEE2E2;

    /* Neutrals */
    --white: #FFFFFF;
    --bg: #F0FFF4;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --text-primary: #1B4332;
    --text-secondary: #2D6A4F;  /* green-800, 6.39:1 on white */
    --text-muted: #64748B;

    /* Spacing */
    --sp-4: 4px; --sp-8: 8px; --sp-12: 12px; --sp-16: 16px;
    --sp-20: 20px; --sp-24: 24px; --sp-32: 32px; --sp-40: 40px;

    /* Radius */
    --r-8: 8px; --r-12: 12px; --r-16: 16px; --r-20: 20px; --r-full: 9999px;

    /* Shadow */
    --shadow-sm: 0 1px 2px rgba(27,67,50,0.04);
    --shadow-md: 0 2px 8px rgba(27,67,50,0.06), 0 1px 2px rgba(27,67,50,0.04);
    --shadow-lg: 0 4px 16px rgba(27,67,50,0.08), 0 1px 3px rgba(27,67,50,0.04);
    --shadow-xl: 0 8px 32px rgba(27,67,50,0.10), 0 2px 6px rgba(27,67,50,0.04);
  }

  /* ══════════════════════════════════════
     RESET & BASE
     ══════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: linear-gradient(180deg, var(--g50) 0%, var(--white) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }

  .device {
    width: 390px;
    min-height: 844px;
    background: linear-gradient(180deg, var(--g50) 0%, var(--white) 60%);
    position: relative;
    overflow-x: hidden;
    padding-bottom: 100px;
  }

  /* ══════════════════════════════════════
     ANIMATIONS
     ══════════════════════════════════════ */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .animate-in { animation: fadeInUp 0.5s ease-out both; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }
  .delay-5 { animation-delay: 0.5s; }

  /* ══════════════════════════════════════
     STATUS BAR (decorative)
     ══════════════════════════════════════ */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px 4px;
    font-size: 14px;
    font-weight: 600;
  }
  .status-bar .time { letter-spacing: 0.5px; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* ══════════════════════════════════════
     TOP BAR
     ══════════════════════════════════════ */
  .topbar {
    display: flex;
    align-items: center;
    padding: 12px 20px 16px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--g900);
    border-radius: var(--r-8);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text {
    font-size: 17px; font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--g900);
  }
  .greeting {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ══════════════════════════════════════
     HERO SECTION
     ══════════════════════════════════════ */
  .hero {
    padding: 20px 20px 0;
  }
  .headline {
    font-size: 28px;
    font-weight: 900;
    line-height: 1.3;
    letter-spacing: -1px;
    color: var(--g900);
    margin-bottom: 10px;
  }
  .headline-accent {
    background: linear-gradient(135deg, var(--g600) 0%, var(--g400) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
  }
  .sub-headline {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 24px;
    font-weight: 400;
  }

  /* ══════════════════════════════════════
     MAIN CTA
     ══════════════════════════════════════ */
  .main-cta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--g900);
    color: var(--white);
    border: none;
    border-radius: var(--r-16);
    padding: 18px 20px;
    width: 100%;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .main-cta::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 150px; height: 100%;
    background: linear-gradient(135deg, transparent 0%, rgba(149,213,178,0.12) 100%);
  }
  .main-cta:hover { background: var(--g800); transform: scale(1.02); box-shadow: var(--shadow-xl); }
  .main-cta:active { transform: scale(0.98); }
  .cta-left { position: relative; z-index: 1; }
  .cta-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .cta-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .cta-arrow {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.12);
    border-radius: var(--r-12);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    transition: background 0.2s;
  }
  .main-cta:hover .cta-arrow { background: rgba(255,255,255,0.2); }

  .streak {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    padding: 0 2px;
  }

  /* ══════════════════════════════════════
     RECENT REPORT CARD
     ══════════════════════════════════════ */
  .section-padding { padding: 0 20px; }
  .recent-report {
    margin-top: 24px;
    background: var(--white);
    border-radius: var(--r-20);
    padding: 20px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(27,67,50,0.04);
  }
  /* Left color bar for emotion state */
  .recent-report::before {
    content: '';
    position: absolute;
    top: 16px; bottom: 16px; left: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--anxious), var(--fearful));
    border-radius: 0 4px 4px 0;
  }
  .report-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .report-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .report-time {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .report-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .report-info h3 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--g900);
    margin-bottom: 4px;
  }
  .report-info p {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* Grade Badge - D */
  .grade-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    border-radius: var(--r-16);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
  }
  .grade-d {
    background: var(--grade-d-bg);
    color: var(--grade-d);
  }

  .report-tags {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--g100);
  }
  .tag {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: var(--r-full);
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .tag-mode {
    background: #FEF3C7;
    color: #92400E; /* amber-800 for AA compliance */
  }
  .tag-emotion {
    background: #FFEDD5;
    color: #9A3412; /* orange-800 for AA compliance */
  }

  /* ══════════════════════════════════════
     BENTO GRID - TOOLS
     ══════════════════════════════════════ */
  .section-title {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 32px;
    margin-bottom: 14px;
    padding: 0 20px;
  }

  .bento-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 12px;
    padding: 0 20px;
  }

  .bento-card {
    border-radius: var(--r-16);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .bento-card:active { transform: scale(0.98); }
  .bento-card:hover { transform: scale(1.02); box-shadow: var(--shadow-lg); }

  /* Hero card - History (spans 2 columns) */
  .bento-hero {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px;
    background: var(--g900);
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .bento-hero::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(149,213,178,0.18) 0%, transparent 70%);
  }
  .bento-hero-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.12);
    border-radius: var(--r-12);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bento-hero-text { flex: 1; position: relative; z-index: 1; }
  .bento-hero-title { font-size: 15px; font-weight: 700; }
  .bento-hero-desc { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .bento-hero-arrow {
    flex-shrink: 0;
    opacity: 0.4;
    position: relative; z-index: 1;
  }

  /* Normal bento cards */
  .bento-normal {
    padding: 18px;
    background: var(--white);
    border: 1px solid var(--g200);
    display: flex;
    flex-direction: column;
    min-height: 120px;
  }
  .bento-normal:hover { border-color: var(--g400); }
  .bento-icon {
    width: 40px; height: 40px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .bento-icon-green { background: var(--g200); }
  .bento-icon-amber { background: #FEF3C7; }
  .bento-icon-purple { background: #F3E8FF; }
  .bento-name { font-size: 14px; font-weight: 700; margin-top: auto; letter-spacing: -0.2px; }
  .bento-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* ══════════════════════════════════════
     BOTTOM NAV - Glassmorphism
     ══════════════════════════════════════ */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid rgba(27,67,50,0.06);
    z-index: 50;
  }
  .nav-inner {
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    text-decoration: none;
    min-width: 56px;
    min-height: 44px;
    justify-content: center;
  }
  .nav-label { font-size: 10px; font-weight: 500; }
  .nav-item.active .nav-label { color: var(--g900); font-weight: 700; }
  .nav-item:not(.active) .nav-label { color: var(--text-muted); }
  .nav-item.active .nav-dot {
    width: 4px; height: 4px;
    background: var(--g600);
    border-radius: 50%;
    position: absolute;
    bottom: -2px;
  }

  /* ══════════════════════════════════════
     RESPONSIVE
     ══════════════════════════════════════ */
  @media (min-width: 768px) {
    .device { border: 1px solid var(--border); border-radius: 40px; margin: 20px auto; box-shadow: var(--shadow-xl); }
  }
  @media (max-width: 389px) {
    .device { width: 100%; }
    .bottom-nav { width: 100%; }
  }
</style>
</head>
<body>

<div class="device">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--g900)"><path d="M1 7h2v4H1V7zm4-3h2v7H5V4zm4-2h2v9H9V2zm4-2h2v11h-2V0z"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--g900)"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5l1.4 1.4C4.4 5.2 6.1 4.4 8 4.4s3.6.8 4.8 2l1.4-1.4C12.6 3.4 10.4 2.4 8 2.4zM8 6.4c-1.4 0-2.6.6-3.4 1.4L6 9.2c.5-.5 1.2-.8 2-.8s1.5.3 2 .8l1.4-1.4C10.6 7 9.4 6.4 8 6.4z"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0" y="1" width="20" height="10" rx="2" stroke="var(--g900)" stroke-width="1.2"/><rect x="2" y="3" width="14" height="6" rx="1" fill="var(--g900)"/><path d="M21 4.5v3a1.5 1.5 0 000-3z" fill="var(--g900)"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="topbar animate-in">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
          <polyline points="4,16 8,16 12,6 16,24 20,10 24,16 28,16" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">Dear,ANT</span>
    </div>
    <span class="greeting">좋은 아침이에요</span>
  </div>

  <!-- Hero -->
  <div class="hero animate-in delay-1">
    <h1 class="headline">오늘,<br>투자해도<br><span class="headline-accent">괜찮은 날</span> 일까요?</h1>
    <p class="sub-headline">감정과 컨디션을 분석해서<br>오늘의 투자 판단을 도와드려요</p>
  </div>

  <!-- Main CTA -->
  <div class="section-padding animate-in delay-2">
    <button class="main-cta">
      <div class="cta-left">
        <div class="cta-title">오늘의 리포트 받기</div>
        <div class="cta-sub">약 2분 소요</div>
      </div>
      <div class="cta-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </button>
    <div class="streak">
      <span>🔥</span>
      <span>1일 연속 기록 중</span>
    </div>
  </div>

  <!-- Recent Report Card -->
  <div class="section-padding animate-in delay-3">
    <div class="recent-report">
      <div class="report-header">
        <span class="report-label">최근 리포트</span>
        <span class="report-time">오늘 08:32</span>
      </div>
      <div class="report-body">
        <div class="report-info">
          <h3>관망 모드</h3>
          <p>감정 흔들림 53%</p>
        </div>
        <div class="grade-badge grade-d" aria-label="등급 D">D</div>
      </div>
      <div class="report-tags">
        <span class="tag tag-mode">관망</span>
        <span class="tag tag-emotion">감정 53점</span>
      </div>
    </div>
  </div>

  <!-- Bento Grid -->
  <div class="section-title animate-in delay-4">분석 및 도구</div>
  <div class="bento-grid animate-in delay-4">
    <!-- History - Hero card -->
    <div class="bento-card bento-hero">
      <div class="bento-hero-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="bento-hero-text">
        <div class="bento-hero-title">히스토리</div>
        <div class="bento-hero-desc">내 투자 컨디션 변화 추이</div>
      </div>
      <svg class="bento-hero-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Trading Journal -->
    <div class="bento-card bento-normal">
      <div class="bento-icon bento-icon-green">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--g800)" stroke-width="2.2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="bento-name">트레이딩 저널</div>
      <div class="bento-desc">매매 기록과 감정</div>
    </div>

    <!-- Savings vs Investment -->
    <div class="bento-card bento-normal">
      <div class="bento-icon bento-icon-amber">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#92400E" stroke-width="2.2" stroke-linecap="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
      </div>
      <div class="bento-name">적금 vs 투자</div>
      <div class="bento-desc">수익률 비교</div>
    </div>

    <!-- Compound Calculator -->
    <div class="bento-card bento-normal">
      <div class="bento-icon bento-icon-purple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B21A8" stroke-width="2.2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div class="bento-name">복리 계산기</div>
      <div class="bento-desc">수익 시뮬레이션</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" role="navigation" aria-label="메인 네비게이션">
  <div class="nav-inner">
    <a href="#" class="nav-item active" aria-label="홈" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--g900)" stroke="var(--g900)" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22" fill="var(--g200)" stroke="var(--g200)"/></svg>
      <span class="nav-label">홈</span>
