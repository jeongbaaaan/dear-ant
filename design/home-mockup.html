<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dear,ANT — Home Mockup v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --g900: #1B4332; --g800: #2D6A4F; --g700: #40916C; --g600: #52B788;
    --g500: #74C69D; --g400: #95D5B2; --g300: #B7E4C7; --g200: #D8F3DC;
    --g100: #E8F5E9; --g50: #F0FFF4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--g50);
    color: var(--g900);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 1200px; margin: 0 auto; padding: 48px 40px 120px; }

  /* ═══ TOP BAR ═══ */
  .topbar { display: flex; align-items: center; margin-bottom: 48px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 32px; height: 32px; background: var(--g900); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
  .greeting { margin-left: auto; font-size: 13px; color: var(--g600); font-weight: 500; }

  /* ═══ HERO + REPORT — 2열 레이아웃 ═══ */
  .hero-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    margin-bottom: 40px;
  }

  .hero-content { display: flex; flex-direction: column; justify-content: center; }

  .headline {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: -1.5px;
    margin-bottom: 14px;
  }
  .headline em { font-style: normal; color: var(--g600); }

  .sub-headline {
    font-size: 15px;
    color: var(--g700);
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .cta {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--g900); color: white; border: none; border-radius: 16px;
    padding: 18px 24px; width: 100%; max-width: 400px; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .cta::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 50%, rgba(149,213,178,0.12) 100%);
  }
  .cta:hover { background: var(--g800); }
  .cta:active { transform: scale(0.98); }
  .cta-title { font-size: 16px; font-weight: 700; }
  .cta-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .streak { margin-top: 12px; font-size: 12px; color: var(--g600); font-weight: 500; }

  /* ═══ 리포트 카드 ═══ */
  .report-card {
    background: white; border-radius: 20px; padding: 28px;
    box-shadow: 0 1px 3px rgba(27,67,50,0.04), 0 8px 24px rgba(27,67,50,0.06);
    position: relative; overflow: hidden;
  }
  .report-card::before {
    content: ''; position: absolute; top: 0; left: 28px; right: 28px; height: 3px;
    background: linear-gradient(90deg, var(--g600), var(--g400)); border-radius: 0 0 3px 3px;
  }
  .report-label { font-size: 11px; color: var(--g500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; }
  .report-body { display: flex; align-items: flex-end; justify-content: space-between; }
  .report-info h3 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .report-info p { font-size: 14px; color: var(--g700); }
  .report-grade { font-size: 56px; font-weight: 900; line-height: 1; color: #f97316; letter-spacing: -2px; }
  .report-meta { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--g100); }
  .meta-tag { font-size: 11px; padding: 5px 12px; border-radius: 20px; font-weight: 600; }
  .meta-mode { background: #FEF3C7; color: #D97706; }
  .meta-score { background: var(--g100); color: var(--g700); }

  /* ═══ 기능 그리드 ═══ */
  .section-label { font-size: 11px; color: var(--g500); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px; }

  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: auto;
    gap: 12px;
  }

  .feature-card {
    border-radius: 16px; cursor: pointer; transition: all 0.15s;
  }
  .feature-card:active { transform: scale(0.98); }

  /* 히스토리 — 다크 풀폭 */
  .fc-hero {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 22px 24px;
    background: var(--g900); color: white;
    position: relative; overflow: hidden;
  }
  .fc-hero::after {
    content: ''; position: absolute; bottom: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(149,213,178,0.2) 0%, transparent 70%);
  }
  .fc-hero .f-icon {
    width: 44px; height: 44px; background: rgba(255,255,255,0.15);
    border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .fc-hero .f-title { font-size: 15px; font-weight: 700; }
  .fc-hero .f-desc { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .fc-hero .f-arrow { margin-left: auto; opacity: 0.4; flex-shrink: 0; }

  /* 일반 카드 */
  .fc-normal {
    padding: 20px; background: white; border: 1px solid var(--g200);
    display: flex; flex-direction: column; min-height: 110px;
  }
  .fc-normal:hover { border-color: var(--g400); box-shadow: 0 2px 12px rgba(27,67,50,0.06); }
  .fc-normal .f-icon {
    width: 40px; height: 40px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  }
  .f-icon.green { background: var(--g200); }
  .f-icon.amber { background: #FEF3C7; }
  .f-icon.purple { background: #F3E8FF; }
  .fc-normal .f-title { font-size: 14px; font-weight: 700; margin-top: auto; }
  .fc-normal .f-desc { font-size: 11px; color: var(--g500); margin-top: 3px; }

  /* ═══ 하단 네비 ═══ */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--g200); z-index: 50;
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 16px; text-decoration: none; }
  .nav-item.active .nav-label { color: var(--g900); font-weight: 700; }
  .nav-item:not(.active) .nav-label { color: var(--g500); }
  .nav-label { font-size: 10px; }

  /* ═══ RESPONSIVE ═══ */

  /* 태블릿 */
  @media (min-width: 768px) {
    .hero-row {
      grid-template-columns: 1.2fr 1fr;
      gap: 32px;
      align-items: center;
    }
    .headline { font-size: 38px; }
    .cta { max-width: 360px; }
    .feature-grid { grid-template-columns: 1fr 1fr 1fr; }
    .fc-hero { grid-column: 1 / -1; }
  }

  /* 데스크톱 */
  @media (min-width: 1024px) {
    .page { padding: 56px 60px 120px; }
    .hero-row {
      grid-template-columns: 1.4fr 1fr;
      gap: 48px;
      margin-bottom: 56px;
    }
    .headline { font-size: 46px; letter-spacing: -2px; }
    .sub-headline { font-size: 16px; }
    .report-card { padding: 32px; }
    .report-grade { font-size: 64px; }

    /* 데스크톱: 히스토리 좌측 tall + 나머지 우측 스택 */
    .feature-grid {
      grid-template-columns: 1.5fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
    }
    .fc-hero {
      grid-column: 1 / 2;
      grid-row: 1 / 3;
      flex-direction: column;
      align-items: flex-start;
      padding: 28px;
      min-height: 240px;
    }
    .fc-hero .f-arrow { margin-left: 0; margin-top: auto; }
  }

  /* 와이드 데스크톱 */
  @media (min-width: 1280px) {
    .headline { font-size: 52px; }
  }
</style>
</head>
<body>

<div class="page">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
          <polyline points="4,16 8,16 12,6 16,24 20,10 24,16 28,16" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">Dear,ANT</span>
    </div>
    <span class="greeting">좋은 아침이에요</span>
  </div>

  <!-- HERO + REPORT (2열) -->
  <div class="hero-row">
    <div class="hero-content">
      <h1 class="headline">오늘,<br>투자해도<br><em>괜찮은 날</em>일까요?</h1>
      <p class="sub-headline">감정과 컨디션을 분석해서<br>오늘의 투자 판단을 도와드려요</p>
      <button class="cta">
        <div>
          <div class="cta-title">오늘의 리포트 받기</div>
          <div class="cta-sub">약 2분 소요</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <p class="streak">🔥 1일 연속 기록 중</p>
    </div>

    <div class="report-card">
      <div class="report-label">최근 리포트 · 오늘</div>
      <div class="report-body">
        <div class="report-info">
          <h3>관망 모드</h3>
          <p>감정 흔들림 53%</p>
        </div>
        <div class="report-grade">D</div>
      </div>
      <div class="report-meta">
        <span class="meta-tag meta-mode">관망</span>
        <span class="meta-tag meta-score">감정 53점</span>
      </div>
    </div>
  </div>

  <!-- 기능 그리드 -->
  <div class="section-label">분석 및 도구</div>
  <div class="feature-grid">
    <div class="feature-card fc-hero">
      <div class="f-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div>
        <div class="f-title">히스토리</div>
        <div class="f-desc">내 투자 컨디션 변화 추이</div>
      </div>
      <svg class="f-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <div class="feature-card fc-normal">
      <div class="f-icon green">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2D6A4F" stroke-width="2.2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="f-title">트레이딩 저널</div>
      <div class="f-desc">매매 기록과 감정</div>
    </div>

    <div class="feature-card fc-normal">
      <div class="f-icon amber">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2.2" stroke-linecap="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
      </div>
      <div class="f-title">적금 vs 투자</div>
      <div class="f-desc">수익률 비교</div>
    </div>

    <div class="feature-card fc-normal">
      <div class="f-icon purple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7E22CE" stroke-width="2.2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div class="f-title">복리 계산기</div>
      <div class="f-desc">수익 시뮬레이션</div>
    </div>
  </div>
</div>

<!-- 하단 네비 -->
<nav class="bottom-nav">
  <div class="nav-inner">
    <a href="#" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#1B4332" stroke="#1B4332" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22" stroke="#D8F3DC"/></svg>
      <span class="nav-label">홈</span>
    </a>
    <a href="#" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="nav-label">리포트</span></a>
    <a href="#" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">히스토리</span></a>
    <a href="#" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span class="nav-label">저널</span></a>
    <a href="#" class="nav-item"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="1.8"><circle cx="12" cy="5" r="1.5" fill="#74C69D"/><circle cx="12" cy="12" r="1.5" fill="#74C69D"/><circle cx="12" cy="19" r="1.5" fill="#74C69D"/></svg><span class="nav-label">더보기</span></a>
  </div>
</nav>

</body>
</html>
