<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dear,ANT — Survey v3 (Self Check)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* ══════════════════════════════════════
     DESIGN TOKENS
     ══════════════════════════════════════ */
  :root {
    /* Green Palette */
    --g900: #1B4332; --g800: #2D6A4F; --g700: #40916C; --g600: #52B788;
    --g500: #74C69D; --g400: #95D5B2; --g300: #B7E4C7; --g200: #D8F3DC;
    --g100: #E8F5E9; --g50: #F0FFF4;

    /* Risk Level Colors */
    --risk-safe: #16A34A;
    --risk-safe-bg: #DCFCE7;
    --risk-caution: #D97706;
    --risk-caution-bg: #FEF3C7;
    --risk-warning: #EA580C;
    --risk-warning-bg: #FFEDD5;
    --risk-danger: #DC2626;
    --risk-danger-bg: #FEE2E2;

    /* Category Colors */
    --cat-condition: #16A34A;
    --cat-condition-bg: #DCFCE7;
    --cat-psychology: #D97706;
    --cat-psychology-bg: #FEF3C7;
    --cat-external: #4F46E5;
    --cat-external-bg: #E0E7FF;

    /* Neutrals */
    --white: #FFFFFF;
    --bg: #F0FFF4;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --border-light: #F1F5F9;
    --text-primary: #1B4332;
    --text-secondary: #2D6A4F;
    --text-muted: #64748B;

    /* Spacing */
    --sp-4: 4px; --sp-8: 8px; --sp-12: 12px; --sp-16: 16px;
    --sp-20: 20px; --sp-24: 24px; --sp-32: 32px;

    /* Radius */
    --r-8: 8px; --r-12: 12px; --r-16: 16px; --r-20: 20px; --r-full: 9999px;

    /* Shadow */
    --shadow-sm: 0 1px 2px rgba(27,67,50,0.04);
    --shadow-md: 0 2px 8px rgba(27,67,50,0.06), 0 1px 2px rgba(27,67,50,0.04);
    --shadow-lg: 0 4px 16px rgba(27,67,50,0.08), 0 1px 3px rgba(27,67,50,0.04);
  }

  /* ══════════════════════════════════════
     RESET & BASE
     ══════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: linear-gradient(180deg, var(--g50) 0%, var(--white) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }

  .device {
    width: 390px;
    min-height: 844px;
    background: linear-gradient(180deg, var(--g50) 0%, var(--white) 50%);
    position: relative;
    overflow-x: hidden;
    padding-bottom: 120px;
  }

  /* ══════════════════════════════════════
     ANIMATIONS
     ══════════════════════════════════════ */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes progressFill {
    from { width: 0; }
    to { width: var(--progress); }
  }
  @keyframes pulseRisk {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .animate-in { animation: fadeInUp 0.4s ease-out both; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }

  /* ══════════════════════════════════════
     STATUS BAR
     ══════════════════════════════════════ */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px 4px;
    font-size: 14px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* ══════════════════════════════════════
     PROGRESS BAR
     ══════════════════════════════════════ */
  .progress-wrap {
    padding: 0 20px;
    margin-bottom: 4px;
  }
  .progress-bar {
    height: 3px;
    background: var(--g200);
    border-radius: var(--r-full);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--g600), var(--g400));
    border-radius: var(--r-full);
    width: 33%;
    animation: progressFill 0.6s ease-out both;
    --progress: 33%;
    transition: width 0.4s ease;
  }

  /* ══════════════════════════════════════
     TOP NAV
     ══════════════════════════════════════ */
  .top-nav {
    display: flex;
    align-items: center;
    padding: 12px 20px 8px;
    gap: 12px;
  }
  .back-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer;
    border-radius: var(--r-12);
    transition: background 0.15s;
  }
  .back-btn:hover { background: var(--g100); }
  .nav-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .step-indicator {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ══════════════════════════════════════
     BIRTHDAY INPUT
     ══════════════════════════════════════ */
  .birthday-section {
    padding: 12px 20px 0;
    margin-bottom: 16px;
  }
  .birthday-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .birthday-input-wrap {
    display: flex;
    align-items: center;
    background: var(--white);
    border: 1.5px solid var(--g200);
    border-radius: var(--r-12);
    padding: 12px 16px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .birthday-input-wrap:focus-within {
    border-color: var(--g600);
    box-shadow: 0 0 0 3px rgba(82,183,136,0.12);
  }
  .birthday-input {
    border: none;
    background: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    outline: none;
    flex: 1;
    letter-spacing: 1px;
  }
  .birthday-input::placeholder { color: var(--text-muted); letter-spacing: 0; }
  .birthday-helper {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    padding-left: 2px;
  }

  /* ══════════════════════════════════════
     RISK INDICATOR (Live)
     ══════════════════════════════════════ */
  .risk-section {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .risk-card {
    background: var(--white);
    border-radius: var(--r-16);
    padding: 16px 18px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(27,67,50,0.04);
  }
  .risk-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .risk-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .risk-status {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .risk-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulseRisk 1.5s ease-in-out infinite;
  }
  .risk-dot-caution { background: var(--risk-caution); }
  .risk-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .risk-text-caution { color: var(--risk-caution); }
  .risk-score {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* Risk gauge bar */
  .risk-gauge {
    height: 8px;
    border-radius: var(--r-full);
    background: var(--border-light);
    overflow: hidden;
    position: relative;
  }
  .risk-gauge-fill {
    height: 100%;
    border-radius: var(--r-full);
    background: linear-gradient(90deg, var(--risk-safe), var(--risk-caution) 50%, var(--risk-warning) 75%, var(--risk-danger));
    width: 45%;
    transition: width 0.4s ease;
  }
  .risk-gauge-segments {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
  }
  .risk-gauge-seg {
    flex: 1;
    border-right: 2px solid rgba(255,255,255,0.6);
  }
  .risk-gauge-seg:last-child { border-right: none; }

  /* ══════════════════════════════════════
     SECTION TITLE
     ══════════════════════════════════════ */
  .check-title {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .check-title h2 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--g900);
    margin-bottom: 4px;
  }
  .check-title p {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* ══════════════════════════════════════
     CATEGORY SECTIONS
     ══════════════════════════════════════ */
  .category {
    padding: 0 20px;
    margin-bottom: 24px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .category-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-dot-condition { background: var(--cat-condition); }
  .cat-dot-psychology { background: var(--cat-psychology); }
  .cat-dot-external { background: var(--cat-external); }

  .category-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ══════════════════════════════════════
     CHIP CARDS (Emoji-based)
     ══════════════════════════════════════ */
  .chip-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .chip-grid-3 {
    grid-template-columns: 1fr 1fr;
  }
  /* For odd items, make last one span full */
  .chip-full { grid-column: 1 / -1; }

  .chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--white);
    border: 1.5px solid var(--g200);
    border-radius: var(--r-16);
    cursor: pointer;
    transition: all 0.2s ease;
    min-height: 52px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover {
    border-color: var(--g400);
    box-shadow: var(--shadow-sm);
  }
  .chip:active {
    transform: scale(0.97);
  }

  /* Selected state */
  .chip.selected {
    background: var(--g900);
    border-color: var(--g900);
    color: var(--white);
    box-shadow: var(--shadow-md);
    transform: scale(1.02);
  }

  .chip-emoji {
    font-size: 20px;
    flex-shrink: 0;
    line-height: 1;
  }
  .chip-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.2px;
    line-height: 1.3;
  }

  /* ══════════════════════════════════════
     BOTTOM CTA
     ══════════════════════════════════════ */
  .bottom-cta-wrap {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(27,67,50,0.06);
    z-index: 50;
  }
  .bottom-cta {
    width: 100%;
    padding: 18px;
    background: var(--g900);
    color: var(--white);
    border: none;
    border-radius: var(--r-16);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 56px;
  }
  .bottom-cta:hover { background: var(--g800); transform: scale(1.02); }
  .bottom-cta:active { transform: scale(0.98); }

  /* ══════════════════════════════════════
     RESPONSIVE
     ══════════════════════════════════════ */
  @media (min-width: 768px) {
    .device { border: 1px solid var(--border); border-radius: 40px; margin: 20px auto; box-shadow: 0 8px 32px rgba(27,67,50,0.10); }
  }
  @media (max-width: 389px) {
    .device { width: 100%; }
    .bottom-cta-wrap { width: 100%; }
  }
</style>
</head>
<body>

<div class="device">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:42</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--g900)"><path d="M1 7h2v4H1V7zm4-3h2v7H5V4zm4-2h2v9H9V2zm4-2h2v11h-2V0z"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--g900)"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5l1.4 1.4C4.4 5.2 6.1 4.4 8 4.4s3.6.8 4.8 2l1.4-1.4C12.6 3.4 10.4 2.4 8 2.4zM8 6.4c-1.4 0-2.6.6-3.4 1.4L6 9.2c.5-.5 1.2-.8 2-.8s1.5.3 2 .8l1.4-1.4C10.6 7 9.4 6.4 8 6.4z"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0" y="1" width="20" height="10" rx="2" stroke="var(--g900)" stroke-width="1.2"/><rect x="2" y="3" width="14" height="6" rx="1" fill="var(--g900)"/><path d="M21 4.5v3a1.5 1.5 0 000-3z" fill="var(--g900)"/></svg>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-wrap animate-in">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="top-nav animate-in">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--g900)" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-title">매매 전 셀프 체크</span>
    <span class="step-indicator">1/3</span>
  </div>

  <!-- Birthday Input -->
  <div class="birthday-section animate-in delay-1">
    <label class="birthday-label">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--g800)" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      생년월일 (바이오리듬 분석용)
    </label>
    <div class="birthday-input-wrap">
      <input type="text" class="birthday-input" placeholder="1990-01-15" value="1992-08-21" maxlength="10" inputmode="numeric" aria-label="생년월일">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--g500)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="birthday-helper">바이오리듬 계산에 사용됩니다</div>
  </div>

  <!-- Risk Indicator (Live) -->
  <div class="risk-section animate-in delay-2">
    <div class="risk-card">
      <div class="risk-header">
        <span class="risk-label">매매 위험도</span>
        <div class="risk-status">
          <div class="risk-dot risk-dot-caution"></div>
          <span class="risk-text risk-text-caution">주의</span>
          <span class="risk-score">45점</span>
        </div>
      </div>
      <div class="risk-gauge">
        <div class="risk-gauge-fill" style="width: 45%;"></div>
        <div class="risk-gauge-segments">
          <div class="risk-gauge-seg"></div>
          <div class="risk-gauge-seg"></div>
          <div class="risk-gauge-seg"></div>
          <div class="risk-gauge-seg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Section Title -->
  <div class="check-title animate-in delay-2">
    <h2>매매 전 셀프 체크</h2>
    <p>해당하는 항목을 모두 선택해 주세요</p>
  </div>

  <!-- Category 1: Condition -->
  <div class="category animate-in delay-3">
    <div class="category-header">
      <div class="category-dot cat-dot-condition"></div>
      <span class="category-name">
        <span>💪</span> 컨디션
      </span>
    </div>
    <div class="chip-grid">
      <div class="chip" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">😴</span>
        <span class="chip-label">수면 부족</span>
      </div>
      <div class="chip" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">🥱</span>
        <span class="chip-label">컨디션 저하</span>
      </div>
      <div class="chip chip-full" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">☕</span>
        <span class="chip-label">카페인 과다</span>
      </div>
    </div>
  </div>

  <!-- Category 2: Psychology -->
  <div class="category animate-in delay-3">
    <div class="category-header">
      <div class="category-dot cat-dot-psychology"></div>
      <span class="category-name">
        <span>🧠</span> 심리
      </span>
    </div>
    <div class="chip-grid">
      <div class="chip selected" role="checkbox" aria-checked="true" tabindex="0">
        <span class="chip-emoji">😤</span>
        <span class="chip-label">손실 만회 욕구</span>
      </div>
      <div class="chip" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">🎰</span>
        <span class="chip-label">근거없는 확신</span>
      </div>
      <div class="chip chip-full" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">😰</span>
        <span class="chip-label">FOMO 불안</span>
      </div>
    </div>
  </div>

  <!-- Category 3: External -->
  <div class="category animate-in delay-4">
    <div class="category-header">
      <div class="category-dot cat-dot-external"></div>
      <span class="category-name">
        <span>🌐</span> 외부 영향
      </span>
    </div>
    <div class="chip-grid">
      <div class="chip" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">📱</span>
        <span class="chip-label">SNS 수익 인증</span>
      </div>
      <div class="chip" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">💬</span>
        <span class="chip-label">종목 추천 받음</span>
      </div>
      <div class="chip chip-full" role="checkbox" aria-checked="false" tabindex="0">
        <span class="chip-emoji">📺</span>
        <span class="chip-label">뉴스 30분 이상 시청</span>
      </div>
    </div>
  </div>
</div>

<!-- Bottom CTA -->
<div class="bottom-cta-wrap">
  <button class="bottom-cta">
    다음
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- Chip toggle interaction -->
<script>
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      const isSelected = chip.classList.contains('selected');
      chip.setAttribute('aria-checked', isSelected);
    });
  });
</script>

</body>
</html>
